<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coin Collection Inventory — John Andres</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f5f7; color: #1a1a2e; }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 32px 40px 24px;
    }
    header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    header p { font-size: 13px; color: #8892a4; margin-top: 4px; }

    .scoreboard {
      display: flex;
      gap: 16px;
      padding: 24px 40px;
      background: white;
      border-bottom: 1px solid #e2e6ea;
      flex-wrap: wrap;
    }
    .score-card {
      flex: 1;
      min-width: 140px;
      background: #f8f9fb;
      border: 1px solid #e2e6ea;
      border-radius: 8px;
      padding: 14px 18px;
    }
    .score-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: #6b7280; }
    .score-card .value { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-top: 4px; }
    .score-card.highlight .value { color: #16a34a; }

    .controls {
      display: flex;
      gap: 12px;
      padding: 20px 40px;
      align-items: center;
      flex-wrap: wrap;
    }
    .controls input, .controls select {
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      background: white;
      color: #1a1a2e;
    }
    .controls input { width: 220px; }
    .controls label { font-size: 12px; color: #6b7280; margin-right: 4px; }
    .controls .control-group { display: flex; align-items: center; gap: 6px; }

    .table-wrap { padding: 0 40px 40px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    thead { background: #1a1a2e; color: white; }
    th {
      padding: 12px 14px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    th:hover { background: #16213e; }
    th.sorted-asc::after { content: ' ↑'; }
    th.sorted-desc::after { content: ' ↓'; }
    td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid #f0f1f3; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8f9fb; }

    .coin-type { font-weight: 600; color: #1a1a2e; }
    .year { color: #374151; }
    .qty { text-align: center; font-weight: 600; }
    .money { text-align: right; font-variant-numeric: tabular-nums; }
    .total-value { font-weight: 700; color: #16a34a; }
    .condition-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }

    .tfoot-row td { background: #1a1a2e; color: white; font-weight: 700; font-size: 13px; }
    .tfoot-row .total-value { color: #86efac; }

    @media (max-width: 768px) {
      header, .scoreboard, .controls, .table-wrap { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Coin Collection Inventory</h1>
  <p>John Andres &nbsp;|&nbsp; Last updated: April 2026</p>
</header>

<div class="scoreboard" id="scoreboard">

    <div class="value" id="stat-value">--</div>
  </div>
</div>

<div class="controls">

  <div class="control-group">

  <div class="control-group">

    </tfoot>
  </table>
</div>

function parseCsv(raw) {
  const lines = raw.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  });
}

function coinType(row) {
  return row['console-name'].replace(/^Coins\s+/, '');
}

function fmt$(pennies) {
  return '$' + (pennies / 100).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

const data = parseCsv(RAW);
let sorted = { col: 'type', dir: 'asc' };
let filtered = [...data];

function buildTypeOptions() {
  const types = [...new Set(data.map(coinType))].sort();
  const sel = document.getElementById('filter-type');
  types.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    sel.appendChild(opt);
  });
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const type = document.getElementById('filter-type').value;
  filtered = data.filter(row => {
    const matchType = !type || coinType(row) === type;
    const matchSearch = !search ||
      row['product-name'].toLowerCase().includes(search) ||
      coinType(row).toLowerCase().includes(search);
    return matchType && matchSearch;
  });
  sortAndRender();
}

function sortAndRender() {
  const colMap = {
    type: r => coinType(r),
    year: r => r['product-name'],
    qty: r => parseInt(r['quantity']) || 0,
    price: r => { const q = parseInt(r['quantity']) || 1; return (parseInt(r['price-in-pennies']) || 0) / q; },
    total: r => parseInt(r['price-in-pennies']) || 0,
    condition: r => r['condition-string'],
    grading: r => r['grading-company'] || '',
    entered: r => r['date-entered']
  };

  filtered.sort((a, b) => {
    const va = colMap[sorted.col](a);
    const vb = colMap[sorted.col](b);
    const cmp = typeof va === 'number' ? va - vb : va.localeCompare(vb);
    return sorted.dir === 'asc' ? cmp : -cmp;
  });

  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  let totalQty = 0, totalVal = 0;

  filtered.forEach(row => {
    const qty = parseInt(row['quantity']) || 0;
    const total = parseInt(row['price-in-pennies']) || 0;
    const price = qty > 0 ? total / qty : 0;
    totalQty += qty;
    totalVal += total;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="coin-type">${coinType(row)}</td>
      <td class="year">${row['product-name']}</td>
      <td class="qty">${qty}</td>
      <td class="money">${fmt$(price)}</td>
      <td class="money total-value">${fmt$(total)}</td>
      <td><span class="condition-badge">${row['condition-string']}</span></td>
      <td>${row['grading-company'] || '<span style="color:#9ca3af">None</span>'}</td>
      <td>${row['date-entered'] || ''}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('foot-qty').textContent = totalQty.toLocaleString();
  document.getElementById('foot-total').textContent = fmt$(totalVal);
  document.getElementById('row-count').textContent = filtered.length + ' of ' + data.length + ' items';

  const types = new Set(filtered.map(coinType));
  document.getElementById('stat-types').textContent = types.size;
  document.getElementById('stat-lines').textContent = filtered.length;
  document.getElementById('stat-qty').textContent = totalQty.toLocaleString();
  document.getElementById('stat-value').textContent = fmt$(totalVal);
}

document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sorted.col === col) {
      sorted.dir = sorted.dir === 'asc' ? 'desc' : 'asc';
    } else {
      sorted.col = col;
      sorted.dir = 'asc';
    }
    document.querySelectorAll('th').forEach(t => t.classList.remove('sorted-asc', 'sorted-desc'));
    th.classList.add('sorted-' + sorted.dir);
    sortAndRender();
  });
});

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('filter-type').addEventListener('change', applyFilters);

buildTypeOptions();
applyFilters();

document.querySelector('th[data-col="type"]').classList.add('sorted-asc');
</script>
</body>
</html>
